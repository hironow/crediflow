name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 5

      - name: Lint
        run: bun run lint
        timeout-minutes: 5

      - name: Type check
        run: bun run check
        timeout-minutes: 5

      - name: Build
        run: bun run build
        timeout-minutes: 5

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        timeout-minutes: 10

      - name: E2E tests
        run: bun run test
        timeout-minutes: 10
